name: Lint (Reusable)

on:
  workflow_call:
    secrets:
      DISCORD_LINT_WEBHOOK:
        required: false
      DISCORD_LINT_ERRORS_WEBHOOK:
        required: false

jobs:
  lint:
    name: Lint Resource
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Lint
        uses: iLLeniumStudios/fivem-lua-lint-action@v2
        with:
          capture: "junit.xml"
          args: "-t --formatter JUnit"
          extra_libs: ox_lib+mysql+qblocales+qbox+qbox_playerdata+qbox_lib

      - name: Generate Lint Report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: "**/junit.xml"
          check_name: Linting Report
          fail_on_failure: true

      - name: Discord Notification
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_LINT_WEBHOOK }}
          ERRORS_WEBHOOK_URL: ${{ secrets.DISCORD_LINT_ERRORS_WEBHOOK }}
          JOB_STATUS: ${{ job.status }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, xml.etree.ElementTree as ET

          webhook = os.environ.get("WEBHOOK_URL", "")
          if not webhook:
              print("::warning::DISCORD_LINT_WEBHOOK secret not set — skipping")
              exit(0)

          job_status = os.environ["JOB_STATUS"]
          repo = os.environ["REPO"]
          branch = os.environ["BRANCH"]
          sha = os.environ["SHA"]
          actor = os.environ["ACTOR"]
          run_id = os.environ["RUN_ID"]
          short_sha = sha[:7]

          # Parse JUnit results
          passed = 0
          failed = 0
          errors = []
          try:
              tree = ET.parse("junit.xml")
              for tc in tree.iter("testcase"):
                  f = tc.find("failure")
                  if f is not None:
                      failed += 1
                      classname = tc.get("classname", "")
                      msg = f.get("message", "") or (f.text or "lint error")
                      if len(msg) > 200:
                          msg = msg[:200] + "..."
                      errors.append(f"\u2022 `{classname}`: {msg}")
                  else:
                      passed += 1
          except FileNotFoundError:
              pass

          # Build description
          if job_status == "success":
              color = 3066993   # green
              status = "\u2705 Passed"
          else:
              color = 15158332  # red
              status = "\u274c Failed"

          lines = [
              f"{status}\n",
              f"**Tests:** {passed} passed" + (f", {failed} failed" if failed else ""),
              f"**Branch:** `{branch}`",
              f"**Commit:** [`{short_sha}`](https://github.com/{repo}/commit/{sha})",
              f"**By:** {actor}",
          ]

          if errors:
              lines.append("")
              lines.append("**Errors:**")
              lines.extend(errors[:10])
              if len(errors) > 10:
                  lines.append(f"... and {len(errors) - 10} more")

          desc = "\n".join(lines)

          # Discord limits embed description to 4096 chars
          if len(desc) > 4000:
              desc = desc[:4000] + "\n... (truncated)"

          payload = json.dumps({
              "embeds": [{
                  "title": f"Lint \u2014 {repo}",
                  "description": desc,
                  "color": color,
                  "url": f"https://github.com/{repo}/actions/runs/{run_id}"
              }]
          })

          req = urllib.request.Request(
              webhook,
              data=payload.encode(),
              headers={
                  "Content-Type": "application/json",
                  "User-Agent": "AG-Lint-Bot/1.0"
              },
              method="POST"
          )
          try:
              urllib.request.urlopen(req)
          except Exception as e:
              print(f"::warning::Discord webhook failed: {e}")

          # Errors-only webhook — only fires when there are lint failures
          errors_webhook = os.environ.get("ERRORS_WEBHOOK_URL", "")
          if errors_webhook and failed > 0:
              err_req = urllib.request.Request(
                  errors_webhook,
                  data=payload.encode(),
                  headers={
                      "Content-Type": "application/json",
                      "User-Agent": "AG-Lint-Bot/1.0"
                  },
                  method="POST"
              )
              try:
                  urllib.request.urlopen(err_req)
              except Exception as e:
                  print(f"::warning::Discord errors webhook failed: {e}")
          PYEOF
